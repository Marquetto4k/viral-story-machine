[build]
  command = "bun run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

# The Netlify TanStack Start Vite plugin writes the SSR handler to
# .netlify/v1/functions/server.mjs during build. Do not override [functions].directory,
# or Netlify will look in the wrong folder and skip uploading the SSR function.